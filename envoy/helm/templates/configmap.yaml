apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envoy.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "envoy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    node:
      # Must match the EnvoyProxy CR: name={{ .Values.name }}, namespace={{ .Release.Namespace }}
      id: "{{ .Values.name }}.{{ .Release.Namespace }}"
      cluster: "{{ .Values.name }}.{{ .Release.Namespace }}"

    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{ .Values.admin.port }}

    dynamic_resources:
      ads_config:
        api_type: GRPC
        transport_api_version: V3
        grpc_services:
          - envoy_grpc:
              cluster_name: xds_cluster
      cds_config:
        resource_api_version: V3
        ads: {}
      lds_config:
        resource_api_version: V3
        ads: {}

    static_resources:
      clusters:
        - name: xds_cluster
          type: STRICT_DNS
          connect_timeout: 5s
          # HTTP/2 is required for gRPC xDS streams.
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.xds.controlPlaneHost }}
                          port_value: {{ .Values.xds.controlPlanePort }}
