# This rule is not used by the project control-plane itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over mesh.mesh.envoy.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/managed-by: kustomize
  name: scopedrouteconfiguration-admin-role
rules:
- apiGroups:
  - mesh.mesh.envoy.io
  resources:
  - scopedrouteconfigurations
  verbs:
  - '*'
- apiGroups:
  - mesh.mesh.envoy.io
  resources:
  - scopedrouteconfigurations/status
  verbs:
  - get
