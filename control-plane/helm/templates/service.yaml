apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "control-plane.selectorLabels" . | nindent 4 }}
  ports:
    - name: xds-grpc
      port: {{ .Values.service.port }}
      targetPort: xds-grpc
      protocol: TCP
