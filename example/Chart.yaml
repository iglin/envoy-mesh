apiVersion: v2
name: envoy-mesh-example
description: >
  End-to-end example for envoy-mesh: deploys two mesh-app instances, a single
  Envoy proxy (edge-proxy), and one CR of every mesh.iglin.io kind.
  Demonstrates RING_HASH load balancing for svc-alpha and cookie-based stateful
  sessions for svc-beta.
type: application
version: 0.1.0
appVersion: "v2.2"
keywords:
  - envoy
  - service-mesh
  - xds
dependencies:
  - name: envoy
    version: "0.0.4"
    repository: "oci://ghcr.io/iglin/envoy-mesh/charts"
