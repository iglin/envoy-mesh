apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-connectivity-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "example.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:8.7.1
      command:
        - sh
        - -c
        - |
          set -e
          ENVOY="http://{{ .Values.envoy.name }}:{{ .Values.envoy.service.port }}"
          OK='\033[0;32mOK\033[0m'
          FAIL='\033[0;31mFAIL\033[0m'

          echo ">>> Waiting for Envoy to become ready..."
          for i in $(seq 1 30); do
            curl -sf "${ENVOY}" -o /dev/null -m 2 && break || true
            sleep 2
          done

          # mesh-app returns a JSON body that includes request-specific fields
          # (X-Request-Id, etc.) that change every call. Extract only the stable
          # per-pod identifier "appId" for stickiness comparisons.
          app_id() { echo "$1" | grep -oE '"appId":"[^"]*"' | head -1; }

          echo ""
          echo "=== /alpha  — RING_HASH via x-user-id header ==="

          for user in alice bob charlie; do
            echo -n "  GET /alpha x-user-id=${user} ... "
            curl -sf -H "x-user-id: ${user}" "${ENVOY}/alpha" -o /dev/null -m 5 && \
              printf "$OK\n" || { printf "$FAIL\n"; exit 1; }
          done

          echo -n "  Stickiness (5x x-user-id=sticky-test → same pod) ... "
          body=$(curl -sf -H "x-user-id: sticky-test" "${ENVOY}/alpha" -m 5)
          first=$(app_id "$body")
          [ -z "$first" ] && { printf "${FAIL} (no appId in body)\n"; exit 1; }
          for i in 2 3 4 5; do
            body=$(curl -sf -H "x-user-id: sticky-test" "${ENVOY}/alpha" -m 5)
            got=$(app_id "$body")
            if [ "$got" != "$first" ]; then
              printf "${FAIL}\n  request $i appId='$got', expected '$first'\n"
              exit 1
            fi
          done
          printf "$OK (appId: $first)\n"

          echo ""
          echo "=== /beta  — ROUND_ROBIN + CookieBasedStatefulSession ==="

          echo -n "  GET /beta (first request, no cookie) ... "
          body=$(curl -sf -c /tmp/cookies.txt "${ENVOY}/beta" -m 5)
          first=$(app_id "$body")
          [ -z "$first" ] && { printf "${FAIL} (no appId in body)\n"; exit 1; }
          printf "$OK (appId: $first)\n"

          echo -n "  sticky-session cookie set by Envoy ... "
          grep -q "sticky-session" /tmp/cookies.txt && \
            printf "$OK\n" || { printf "$FAIL\n"; exit 1; }

          echo -n "  Stickiness (4x with cookie jar → same pod) ... "
          for i in 2 3 4 5; do
            body=$(curl -sf -b /tmp/cookies.txt -c /tmp/cookies.txt "${ENVOY}/beta" -m 5)
            got=$(app_id "$body")
            if [ "$got" != "$first" ]; then
              printf "${FAIL}\n  request $i appId='$got', expected '$first'\n"
              exit 1
            fi
          done
          printf "$OK (appId: $first)\n"

          echo ""
          echo "=== All connectivity and stickiness tests passed ==="
