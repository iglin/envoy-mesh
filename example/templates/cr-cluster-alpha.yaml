apiVersion: mesh.iglin.io/v1alpha1
kind: Cluster
metadata:
  name: cluster-svc-alpha
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "example.labels" . | nindent 4 }}
targetRef:
  name: {{ .Values.envoy.name }}
# kubernetesServiceRef enables automatic EDS: the control-plane watches the
# EndpointSlices for this Service and synthesises a ClusterLoadAssignment in
# memory at every reconcile, so pod IP churn never requires a manual CR update.
kubernetesServiceRef:
  name: {{ .Values.appAlpha.name }}
  port: {{ .Values.appAlpha.port }}
spec:
  # type: EDS — endpoints are delivered dynamically via the xDS ADS stream.
  # The kubernetesServiceRef above drives the ClusterLoadAssignment pushed by
  # the control-plane; no inline load_assignment is needed or allowed here.
  name: svc-alpha
  type: EDS
  eds_cluster_config:
    eds_config:
      resource_api_version: V3
      ads: {}
  lb_policy: RING_HASH
  ring_hash_lb_config:
    minimum_ring_size: 64
  connect_timeout: "5s"
