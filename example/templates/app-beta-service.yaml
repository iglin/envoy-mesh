apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appBeta.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "example.labels" . | nindent 4 }}
    {{- include "example.betaLabels" . | nindent 4 }}
spec:
  # Headless — DNS returns individual pod IPs so that STRICT_DNS in Envoy
  # sees each pod as a distinct endpoint. CookieBasedStatefulSession encodes
  # the chosen endpoint address into the cookie and routes subsequent requests
  # to that specific pod. A ClusterIP VIP would collapse all pods into one
  # Envoy endpoint, breaking per-pod stickiness.
  clusterIP: None
  selector:
    {{- include "example.betaLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.appBeta.port }}
      targetPort: http
      protocol: TCP
