                                          ``abc`` matches the value ``abc.xyz``'
                                        type: string
                                      safe_regex:
                                        description: The input string must match the
                                          regular expression specified here.
                                        properties:
                                          google_re2:
                                            description: Google's RE2 regex engine.
                                            properties:
                                              max_program_size:
                                                description: 'This field controls
                                                  the RE2 "program size" which is
                                                  a rough estimate of how complex
                                                  a  compiled regex is to evaluate.
                                                  A regex that has a program size
                                                  greater than the configured  value
                                                  will fail to compile. In this case,
                                                  the configured max program size
                                                  can be increased  or the regex can
                                                  be simplified. If not specified,
                                                  the default is 100.   This field
                                                  is deprecated; regexp validation
                                                  should be performed on the management
