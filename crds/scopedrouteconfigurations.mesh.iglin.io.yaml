                                properties:
                                  key_matcher:
                                    description: A string matcher that will be applied
                                      to the header key. If the header key  matches,
                                      the header will be removed.
                                    properties:
                                      contains:
                                        description: 'The input string must have the
                                          substring specified here.   .. note::    Empty
                                          contains match is not allowed, please use
                                          ``safe_regex`` instead.   Examples:   *
                                          ``abc`` matches the value ``xyz.abc.def``'
                                        type: string
                                      custom:
                                        description: 'Use an extension as the matcher
