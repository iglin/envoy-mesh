                            the inner type  URL of ``TypedStruct`` will be utilized.
                            See the  :ref:`extension configuration overview  <config_overview_extension_configuration>`
                            for further details.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        type: object
                    type: object
                  most_specific_header_mutations_wins:
                    description: Headers mutations at all levels are evaluated, if
                      specified. By default, the order is from most  specific (i.e.
                      route entry level) to least specific (i.e. route configuration
                      level). Later header  mutations may override earlier mutations.  This
                      order can be reversed by setting this field to true. In other
                      words, most specific level mutation  is evaluated last.
                    type: boolean
                  name:
                    description: The name of the route configuration. For example,
                      it might match  :ref:`route_config_name  <envoy_v3_api_field_extensions.filters.network.http_connection_manager.v3.Rds.route_config_name>`
                      in  :ref:`envoy_v3_api_msg_extensions.filters.network.http_connection_manager.v3.Rds`.
                    type: string
                  request_headers_to_add:
                    description: Specifies a list of HTTP headers that should be added
                      to each request  routed by the HTTP connection manager. Headers
                      specified at this level are  applied after headers from any
                      enclosed :ref:`envoy_v3_api_msg_config.route.v3.VirtualHost`
                      or  :ref:`envoy_v3_api_msg_config.route.v3.RouteAction`. For
                      more information, including details on  header value syntax,
                      see the documentation on :ref:`custom request headers  <config_http_conn_man_headers_custom_request_headers>`.
                    items:
                      description: Header name/value pair plus option to control append
                        behavior.
                      properties:
                        append:
                          description: 'Should the value be appended? If true (default),
                            the value is appended to  existing values. Otherwise it
                            replaces any existing values.  This field is deprecated
