                            type, the containing resource is NACKed. If is_optional
                            is set to true, the resource  would not be NACKed for
                            this reason. In this case, routes referencing this plugin's
                            name would  not be treated as an illegal configuration,
                            but would result in a failure if the route is  selected.
                          type: boolean
                      type: object
                    type: array
                  ignore_path_parameters_in_path_matching:
                    description: 'Ignore path-parameters in path-matching.  Before
                      RFC3986, URI were like(RFC1808): <scheme>://<net_loc>/<path>;<params>?<query>#<fragment>  Envoy
                      by default takes ":path" as "<path>;<params>".  For users who
                      want to only match path on the "<path>" portion, this option
                      should be true.'
                    type: boolean
                  ignore_port_in_host_matching:
                    description: 'By default, port in :authority header (if any) is
                      used in host matching.  With this option enabled, Envoy will
                      ignore the port number in the :authority header (if any) when
                      picking VirtualHost.   .. note::      This option will not strip
                      the port number (if any) contained in route config      :ref:`envoy_v3_api_msg_config.route.v3.VirtualHost`.domains
                      field.'
                    type: boolean
                  internal_only_headers:
                    description: Optionally specifies a list of HTTP headers that
                      the connection manager  will consider to be internal only. If
                      they are found on external requests they will be cleaned  prior
                      to filter invocation. See :ref:`config_http_conn_man_headers_x-envoy-internal`
                      for more  information.
                    items:
                      type: string
                    type: array
                  max_direct_response_body_size_bytes:
                    description: 'The maximum bytes of the response :ref:`direct response
                      body  <envoy_v3_api_field_config.route.v3.DirectResponseAction.body>`
                      size. If not specified the default  is 4096.   .. warning::     Envoy
                      currently holds the content of :ref:`direct response body    <envoy_v3_api_field_config.route.v3.DirectResponseAction.body>`
                      in memory. Be careful setting    this to be larger than the
                      default 4KB, since the allocated memory for direct response
                      body    is not subject to data plane buffering controls.'
                    format: int32
                    type: integer
                  metadata:
                    description: The metadata field can be used to provide additional
                      information  about the route configuration. It can be used for
                      configuration, stats, and logging.  The metadata should go under
                      the filter namespace that will need it.  For instance, if the
                      metadata is intended for the Router filter,  the filter name
                      should be specified as ``envoy.filters.http.router``.
                    properties:
                      filter_metadata:
                        additionalProperties:
                          description: Additional configuration for site-specific
                            customizations of the Google  gRPC library.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        type: object
                      typed_filter_metadata:
                        additionalProperties:
                          description: The typed config for the extension. The type
                            URL will be used to identify  the extension. In the case
                            that the type URL is ``xds.type.v3.TypedStruct``  (or,
