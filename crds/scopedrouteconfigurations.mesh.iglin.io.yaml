                    items:
                      description: 'The router is capable of shadowing traffic from
                        one cluster to another. The current  implementation is "fire
                        and forget," meaning Envoy will not wait for the shadow cluster
                        to  respond before returning the response from the primary
                        cluster. All normal statistics are  collected for the shadow
                        cluster making this feature useful for testing.   During shadowing,
                        the host/authority header is altered such that ``-shadow``
                        is appended. This is  useful for logging. For example, ``cluster1``
                        becomes ``cluster1-shadow``. This behavior can be  disabled
                        by setting ``disable_shadow_host_suffix_append`` to ``true``.   ..
                        note::     Shadowing will not be triggered if the primary
                        cluster does not exist.   .. note::     Shadowing doesn''t
                        support HTTP CONNECT and upgrades.  [#next-free-field: 9]'
                      properties:
                        cluster:
                          description: 'Only one of ``cluster`` and ``cluster_header``
                            can be specified.  [#next-major-version: Need to add back
                            the validation rule: (validate.rules).string = {min_len:
                            1}]  Specifies the cluster that requests will be mirrored
                            to. The cluster must  exist in the cluster manager configuration.'
                          type: string
                        cluster_header:
                          description: 'Only one of ``cluster`` and ``cluster_header``
                            can be specified.  Envoy will determine the cluster to
                            route to by reading the value of the  HTTP header named
                            by cluster_header from the request headers. Only the first
                            value in header is used,  and no shadow request will happen
                            if the value is not found in headers. Envoy will not wait
                            for  the shadow cluster to respond before returning the
                            response from the primary cluster.   .. attention::     Internally,
                            Envoy always uses the HTTP/2 ``:authority`` header to
                            represent the HTTP/1    ``Host`` header. Thus, if attempting
                            to match on ``Host``, match on ``:authority`` instead.   ..
                            note::     If the header appears multiple times only the
                            first value is used.'
                          type: string
                        disable_shadow_host_suffix_append:
                          description: Disables appending the ``-shadow`` suffix to
                            the shadowed ``Host`` header.   Defaults to ``false``.
                          type: boolean
