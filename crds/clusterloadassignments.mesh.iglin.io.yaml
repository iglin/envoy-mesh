                                  with ``address`` comprise the  list of addresses
                                  for an endpoint. The address given in the ``address``
                                  is  prepended to this list. It is assumed that the
                                  list must already be  sorted by preference order
                                  of the addresses. This will only be supported  for
                                  STATIC and EDS clusters.
                                items:
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                                type: array
                              address:
