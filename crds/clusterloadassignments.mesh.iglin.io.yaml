              endpoints:
                description: List of endpoints to load balance to.
                items:
                  description: 'A group of endpoints belonging to a Locality.  One
                    can have multiple LocalityLbEndpoints for a locality, but only
                    if  they have different priorities.  [#next-free-field: 10]'
