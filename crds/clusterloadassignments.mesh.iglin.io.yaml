                              load balancing weight for an endpoint is divided by
                              the sum  of the weights of all endpoints in the endpoint's
                              locality to produce a  percentage of traffic for the
                              endpoint. This percentage is then further  weighted
                              by the endpoint's locality's load balancing weight from  LocalityLbEndpoints.
