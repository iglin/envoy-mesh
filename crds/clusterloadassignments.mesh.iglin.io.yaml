        properties:
          spec:
            description: 'Each route from RDS will map to a single cluster or traffic
              split across  clusters using weights expressed in the RDS WeightedCluster.   With
              EDS, each cluster is treated independently from a LB perspective, with  LB
              taking place between the Localities within a cluster and at a finer  granularity
              between the hosts within a locality. The percentage of traffic  for
              each endpoint is determined by both its load_balancing_weight, and the  load_balancing_weight
              of its locality. First, a locality will be selected,  then an endpoint
              within that locality will be chose based on its weight.  [#next-free-field:
              6]'
            properties:
              cluster_name:
                description: Name of the cluster. This will be the :ref:`service_name  <envoy_v3_api_field_config.cluster.v3.Cluster.EdsClusterConfig.service_name>`
