                                  form of host address depends on the given cluster
                                  type. For STATIC or EDS,    it is expected to be
                                  a direct IP address (or something resolvable by
                                  the    specified :ref:`resolver <envoy_v3_api_field_config.core.v3.SocketAddress.resolver_name>`    in
                                  the Address). For LOGICAL or STRICT DNS, it is expected
                                  to be hostname,    and will be resolved via DNS.'
