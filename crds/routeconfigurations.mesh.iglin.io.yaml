                        key:
                          description: Header name.
                          type: string
                        raw_value:
                          description: Header value is encoded as bytes which can
                            support non-utf8 characters.  Only one of ``value`` or
                            ``raw_value`` can be set.
                          format: byte
                          type: string
                        value:
                          description: Header value.   The same :ref:`format specifier
                            <config_access_log_format>` as used for  :ref:`HTTP access
                            logging <config_access_log>` applies here, however  unknown
                            header values are replaced with the empty string instead
