                      type: boolean
                  type: object
                type: array
              response_headers_to_remove:
                description: Specifies a list of HTTP headers that should be removed
                  from each response  that the connection manager encodes.
                items:
                  type: string
                type: array
              typed_per_filter_config:
                additionalProperties:
                  description: The typed config for the extension. The type URL will
                    be used to identify  the extension. In the case that the type
                    URL is ``xds.type.v3.TypedStruct``  (or, for historical reasons,
                    ``udpa.type.v1.TypedStruct``), the inner type  URL of ``TypedStruct``
