                                    for discussion on gRPC client selection.
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                                google_grpc:
                                  description: '`Google C++ gRPC client <https://github.com/grpc/grpc>`_  See
                                    the :ref:`gRPC services overview <arch_overview_grpc_services>`  documentation
                                    for discussion on gRPC client selection.'
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                                initial_metadata:
                                  description: 'Additional metadata to include in
                                    streams initiated to the GrpcService. This can
                                    be used for  scenarios in which additional ad
                                    hoc authorization headers (e.g. ``x-foo-bar: baz-key``)
                                    are to  be injected. For more information, including
                                    details on header value syntax, see the  documentation
                                    on :ref:`custom request headers  <config_http_conn_man_headers_custom_request_headers>`.'
                                  items:
                                    description: Header name/value pair.
                                    properties:
                                      key:
                                        description: Header name.
                                        type: string
                                      raw_value:
                                        description: Header value is encoded as bytes
                                          which can support non-utf8 characters.  Only
                                          one of ``value`` or ``raw_value`` can be
                                          set.
                                        format: byte
                                        type: string
                                      value:
                                        description: Header value.   The same :ref:`format
                                          specifier <config_access_log_format>` as
                                          used for  :ref:`HTTP access logging <config_access_log>`
                                          applies here, however  unknown header values
                                          are replaced with the empty string instead
                                          of ``-``.  Header value is encoded as string.
                                          This does not work for non-utf8 characters.  Only
                                          one of ``value`` or ``raw_value`` can be
                                          set.
                                        type: string
                                    type: object
                                  type: array
                                retry_policy:
                                  description: 'Optional default retry policy for
                                    RPCs or streams initiated toward this gRPC service.   If
