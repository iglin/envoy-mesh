                                  authorization service <envoy_v3_api_msg_service.auth.v3.CheckResponse>`
                                  and    :ref:`external processor service <envoy_v3_api_msg_service.ext_proc.v3.ProcessingResponse>`
                                  have    default value (``false``) for this field.'
                                type: boolean
                              append_action:
                                description: Describes the action taken to append/overwrite
                                  the given value for an existing header  or to only
                                  add this header if it's absent.  Value defaults
                                  to :ref:`APPEND_IF_EXISTS_OR_ADD  <envoy_v3_api_enum_value_config.core.v3.HeaderValueOption.HeaderAppendAction.APPEND_IF_EXISTS_OR_ADD>`.
                                type: object
                                x-kubernetes-preserve-unknown-fields: true
                              header:
                                description: Header name/value pair that this option
                                  applies to.
                                properties:
                                  key:
                                    description: Header name.
                                    type: string
                                  raw_value:
                                    description: Header value is encoded as bytes
                                      which can support non-utf8 characters.  Only
                                      one of ``value`` or ``raw_value`` can be set.
                                    format: byte
                                    type: string
                                  value:
                                    description: Header value.   The same :ref:`format
                                      specifier <config_access_log_format>` as used
                                      for  :ref:`HTTP access logging <config_access_log>`
                                      applies here, however  unknown header values
                                      are replaced with the empty string instead of
                                      ``-``.  Header value is encoded as string. This
                                      does not work for non-utf8 characters.  Only
                                      one of ``value`` or ``raw_value`` can be set.
                                    type: string
                                type: object
                              keep_empty_value:
                                description: Is the header value allowed to be empty?
                                  If false (default), custom headers with empty values
                                  are dropped,  otherwise they are added.
                                type: boolean
                            type: object
                          remove:
                            description: Remove the specified header if it exists.
                            type: string
                          remove_on_match:
                            description: Remove the header if the key matches the
                              specified string matcher.
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                        type: object
                      type: array
                    runtime_fraction:
                      description: If not specified, all requests to the target cluster
                        will be mirrored.   If specified, this field takes precedence
                        over the ``runtime_key`` field and requests must also  fall
                        under the percentage of matches indicated by this field.   For
                        some fraction N/D, a random number in the range [0,D) is selected.
                        If the  number is <= the value of the numerator N, or if the
                        key is not present, the default  value, the request will be
                        mirrored.
                      properties:
                        default_value:
                          description: Default value if the runtime value's for the
                            numerator/denominator keys are not available.
                          properties:
                            denominator:
                              description: Specifies the denominator. If the denominator
                                specified is less than the numerator, the final  fractional
                                percentage is capped at 1 (100%).
                              type: object
                              x-kubernetes-preserve-unknown-fields: true
                            numerator:
                              description: Specifies the numerator. Defaults to 0.
                              format: int32
                              type: integer
                          type: object
                        runtime_key:
                          description: Runtime key for a YAML representation of a
                            FractionalPercent.
                          type: string
                      type: object
                    trace_sampled:
                      description: Specifies whether the trace span for the shadow
                        request should be sampled. If this field is not explicitly
                        set,  the shadow request will inherit the sampling decision
                        of its parent span. This ensures consistency with the trace  sampling
                        policy of the original request and prevents oversampling,
                        especially in scenarios where runtime sampling  is disabled.
                      type: boolean
                  type: object
                type: array
              response_headers_to_add:
                description: Specifies a list of HTTP headers that should be added
                  to each response that  the connection manager encodes. Headers specified
                  at this level are applied  after headers from any enclosed :ref:`envoy_v3_api_msg_config.route.v3.VirtualHost`
                  or  :ref:`envoy_v3_api_msg_config.route.v3.RouteAction`. For more
