                    for further details.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: object
              validate_clusters:
                description: An optional boolean that specifies whether the clusters
                  that the route  table refers to will be validated by the cluster
                  manager. If set to true  and a route refers to a non-existent cluster,
                  the route table will not  load. If set to false and a route refers
                  to a non-existent cluster, the  route table will load and the router
                  filter will return a 404 if the route  is selected at runtime. This
                  setting defaults to true if the route table  is statically defined
                  via the :ref:`route_config  <envoy_v3_api_field_extensions.filters.network.http_connection_manager.v3.HttpConnectionManager.route_config>`  option.
                  This setting default to false if the route table is loaded dynamically
                  via the  :ref:`rds  <envoy_v3_api_field_extensions.filters.network.http_connection_manager.v3.HttpConnectionManager.rds>`  option.
                  Users may wish to override the default behavior in certain cases
                  (for example when  using CDS with a static route table).
                type: boolean
              vhds:
                description: An array of virtual hosts will be dynamically loaded
                  via the VHDS API.  Both ``virtual_hosts`` and ``vhds`` fields will
                  be used when present. ``virtual_hosts`` can be used  for a base
                  routing table or for infrequently changing virtual hosts. ``vhds``
                  is used for  on-demand discovery of virtual hosts. The contents
                  of these two fields will be merged to  generate a routing table
                  for a given RouteConfiguration, with ``vhds`` derived configuration  taking
                  precedence.
                properties:
                  config_source:
                    description: Configuration source specifier for VHDS.
                    properties:
                      ads:
                        description: When set, ADS will be used to fetch resources.
                          The ADS API configuration  source in the bootstrap configuration
                          is used.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      api_config_source:
                        description: API configuration source.
                        properties:
                          api_type:
                            description: API type (gRPC, REST, delta gRPC)
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                          cluster_names:
                            description: 'Cluster names should be used only with REST.
                              If > 1  cluster is defined, clusters will be cycled
                              through if any kind of failure  occurs.   .. note::    The
                              cluster with name ``cluster_name`` must be statically
                              defined and its   type must not be ``EDS``.'
                            items:
                              type: string
                            type: array
                          config_validators:
                            description: 'A list of config validators that will be
                              executed when a new update is  received from the ApiConfigSource.
                              Note that each validator handles a  specific xDS service
                              type, and only the validators corresponding to the  type
                              url (in ``:ref: DiscoveryResponse`` or ``:ref: DeltaDiscoveryResponse``)  will
                              be invoked.  If the validator returns false or throws
                              an exception, the config will be rejected by  the client,
                              and a NACK will be sent.  [#extension-category: envoy.config.validators]'
                            items:
                              description: 'Message type for extension configuration.  [#next-major-version:
