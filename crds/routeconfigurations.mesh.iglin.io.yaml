            properties:
              cluster_specifier_plugins:
                description: A list of plugins and their configurations which may
                  be used by a  :ref:`cluster specifier plugin name <envoy_v3_api_field_config.route.v3.RouteAction.cluster_specifier_plugin>`  within
                  the route. All ``extension.name`` fields in this list must be unique.
                items:
                  description: Configuration for a cluster specifier plugin.
                  properties:
                    extension:
                      description: 'The name of the plugin and its opaque configuration.   [#extension-category:
                        envoy.router.cluster_specifier_plugin]'
                      properties:
                        name:
                          description: The name of an extension. This is not used
                            to select the extension, instead  it serves the role of
                            an opaque identifier.
                          type: string
                        typed_config:
                          description: The typed config for the extension. The type
                            URL will be used to identify  the extension. In the case
                            that the type URL is ``xds.type.v3.TypedStruct``  (or,
                            for historical reasons, ``udpa.type.v1.TypedStruct``),
                            the inner type  URL of ``TypedStruct`` will be utilized.
                            See the  :ref:`extension configuration overview  <config_overview_extension_configuration>`
                            for further details.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      type: object
                    is_optional:
                      description: If is_optional is not set or is set to false and
                        the plugin defined by this message is not a  supported type,
                        the containing resource is NACKed. If is_optional is set to
                        true, the resource  would not be NACKed for this reason. In
                        this case, routes referencing this plugin's name would  not
                        be treated as an illegal configuration, but would result in
                        a failure if the route is  selected.
                      type: boolean
                  type: object
                type: array
              ignore_path_parameters_in_path_matching:
                description: 'Ignore path-parameters in path-matching.  Before RFC3986,
                  URI were like(RFC1808): <scheme>://<net_loc>/<path>;<params>?<query>#<fragment>  Envoy
                  by default takes ":path" as "<path>;<params>".  For users who want
                  to only match path on the "<path>" portion, this option should be
                  true.'
                type: boolean
              ignore_port_in_host_matching:
                description: 'By default, port in :authority header (if any) is used
                  in host matching.  With this option enabled, Envoy will ignore the
                  port number in the :authority header (if any) when picking VirtualHost.   ..
                  note::      This option will not strip the port number (if any)
                  contained in route config      :ref:`envoy_v3_api_msg_config.route.v3.VirtualHost`.domains
                  field.'
                type: boolean
              internal_only_headers:
                description: Optionally specifies a list of HTTP headers that the
