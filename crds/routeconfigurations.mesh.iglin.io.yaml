                                typed_config:
                                  description: The typed config for the extension.
                                    The type URL will be used to identify  the extension.
                                    In the case that the type URL is ``xds.type.v3.TypedStruct``  (or,
                                    for historical reasons, ``udpa.type.v1.TypedStruct``),
                                    the inner type  URL of ``TypedStruct`` will be
                                    utilized. See the  :ref:`extension configuration
                                    overview  <config_overview_extension_configuration>`
                                    for further details.
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                              type: object
                            type: array
                          grpc_services:
                            description: Multiple gRPC services be provided for GRPC.
                              If > 1 cluster is defined,  services will be cycled
                              through if any kind of failure occurs.
                            items:
                              description: 'gRPC service configuration. This is used
                                by :ref:`ApiConfigSource  <envoy_v3_api_msg_config.core.v3.ApiConfigSource>`
                                and filter configurations.  [#next-free-field: 7]'
                              properties:
