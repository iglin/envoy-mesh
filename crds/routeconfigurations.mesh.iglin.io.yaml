                type: array
              request_mirror_policies:
                description: Specify a set of default request mirroring policies which
                  apply to all routes under its virtual hosts.  Note that policies
                  are not merged, the most specific non-empty one becomes the mirror
                  policies.
                items:
                  description: 'The router is capable of shadowing traffic from one
                    cluster to another. The current  implementation is "fire and forget,"
                    meaning Envoy will not wait for the shadow cluster to  respond
                    before returning the response from the primary cluster. All normal
                    statistics are  collected for the shadow cluster making this feature
                    useful for testing.   During shadowing, the host/authority header
                    is altered such that ``-shadow`` is appended. This is  useful
                    for logging. For example, ``cluster1`` becomes ``cluster1-shadow``.
                    This behavior can be  disabled by setting ``disable_shadow_host_suffix_append``
                    to ``true``.   .. note::     Shadowing will not be triggered if
                    the primary cluster does not exist.   .. note::     Shadowing
                    doesn''t support HTTP CONNECT and upgrades.  [#next-free-field:
                    9]'
                  properties:
                    cluster:
                      description: 'Only one of ``cluster`` and ``cluster_header``
                        can be specified.  [#next-major-version: Need to add back
                        the validation rule: (validate.rules).string = {min_len: 1}]  Specifies
                        the cluster that requests will be mirrored to. The cluster
                        must  exist in the cluster manager configuration.'
                      type: string
                    cluster_header:
                      description: 'Only one of ``cluster`` and ``cluster_header``
                        can be specified.  Envoy will determine the cluster to route
                        to by reading the value of the  HTTP header named by cluster_header
                        from the request headers. Only the first value in header is
                        used,  and no shadow request will happen if the value is not
                        found in headers. Envoy will not wait for  the shadow cluster
                        to respond before returning the response from the primary
                        cluster.   .. attention::     Internally, Envoy always uses
                        the HTTP/2 ``:authority`` header to represent the HTTP/1    ``Host``
                        header. Thus, if attempting to match on ``Host``, match on
                        ``:authority`` instead.   .. note::     If the header appears
                        multiple times only the first value is used.'
                      type: string
                    disable_shadow_host_suffix_append:
                      description: Disables appending the ``-shadow`` suffix to the
                        shadowed ``Host`` header.   Defaults to ``false``.
                      type: boolean
                    host_rewrite_literal:
                      description: Indicates that during mirroring, the host header
                        will be swapped with this value.  :ref:`disable_shadow_host_suffix_append  <envoy_v3_api_field_config.route.v3.RouteAction.RequestMirrorPolicy.disable_shadow_host_suffix_append>`  is
                        implicitly enabled if this field is set.
                      type: string
                    request_headers_mutations:
                      description: Specifies a list of header mutations that should
                        be applied to each mirrored request.  Header mutations are
                        applied in the order they are specified. For more information,
                        including  details on header value syntax, see the documentation
                        on :ref:`custom request headers  <config_http_conn_man_headers_custom_request_headers>`.
                      items:
                        description: The HeaderMutation structure specifies an action
                          that may be taken on HTTP  headers.
                        properties:
                          append:
                            description: Append new header by the specified HeaderValueOption.
                            properties:
                              append:
                                description: 'Should the value be appended? If true
                                  (default), the value is appended to  existing values.
                                  Otherwise it replaces any existing values.  This
                                  field is deprecated and please use  :ref:`append_action
