                      downstream connections the ``opened_streams`` is incremented
                      when  Envoy receives complete response headers from the upstream
                      server. For upstream connection the  ``opened_streams`` is incremented
                      when Envoy sends the ``HEADERS`` frame for a new stream. The  ``http2.inbound_priority_frames_flood``
