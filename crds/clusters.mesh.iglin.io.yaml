                      mitigation. The default limit is ``100``.'
                    format: int32
                    type: integer
                  max_inbound_window_update_frames_per_data_frame_sent:
                    description: 'Limit the number of inbound ``WINDOW_UPDATE`` frames
                      allowed per ``DATA`` frame sent. If the number  of ``WINDOW_UPDATE``
                      frames received over the lifetime of connection exceeds the
                      value calculated  using this formula::     ``5 + 2 * (opened_streams
