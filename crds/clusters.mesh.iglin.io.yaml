---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    mesh.iglin.io/proto-source: envoy.config.cluster.v3.Cluster
  name: clusters.mesh.iglin.io
spec:
  group: mesh.iglin.io
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            description: 'Configuration for a single upstream cluster.  [#next-free-field:
              60]'
            properties:
              alt_stat_name:
                description: 'An optional alternative to the cluster name to be used
                  for observability. This name is used  for emitting stats for the
                  cluster and access logging the cluster name. This will appear as  additional
                  information in configuration dumps of a cluster''s current status
                  as  :ref:`observability_name <envoy_v3_api_field_admin.v3.ClusterStatus.observability_name>`  and
                  as an additional tag "upstream_cluster.name" while tracing.   ..
                  note::    Any ``:`` in the name will be converted to ``_`` when
                  emitting statistics. This should not be confused with    :ref:`Router
                  Filter Header <config_http_filters_router_x-envoy-upstream-alt-stat-name>`.'
                type: string
              circuit_breakers:
                description: Optional :ref:`circuit breaking <arch_overview_circuit_break>`
                  for the cluster.
                properties:
                  per_host_thresholds:
                    description: 'Optional per-host limits which apply to each individual
                      host in a cluster.   .. note::   currently only the :ref:`max_connections   <envoy_v3_api_field_config.cluster.v3.CircuitBreakers.Thresholds.max_connections>`
                      field is supported for per-host limits.   If multiple per-host
                      :ref:`Thresholds<envoy_v3_api_msg_config.cluster.v3.CircuitBreakers.Thresholds>`  are
                      defined with the same :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`,  the
                      first one in the list is used. If no per-host Thresholds are
                      defined for a given  :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`,  the
                      cluster will not have per-host limits.'
                    items:
                      description: 'A Thresholds defines CircuitBreaker settings for
                        a  :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`.  [#next-free-field:
                        9]'
                      properties:
                        max_connection_pools:
                          description: The maximum number of connection pools per
                            cluster that Envoy will concurrently support at  once.
                            If not specified, the default is unlimited. Set this for
                            clusters which create a  large number of connection pools.
                            See  :ref:`Circuit Breaking <arch_overview_circuit_break_cluster_maximum_connection_pools>`
                            for  more details.
                          format: int32
                          type: integer
                        max_connections:
                          description: The maximum number of connections that Envoy
                            will make to the upstream  cluster. If not specified,
                            the default is 1024.
                          format: int32
                          type: integer
                        max_pending_requests:
                          description: The maximum number of pending requests that
                            Envoy will allow to the  upstream cluster. If not specified,
                            the default is 1024.  This limit is applied as a connection
                            limit for non-HTTP traffic.
                          format: int32
                          type: integer
                        max_requests:
                          description: The maximum number of parallel requests that
                            Envoy will make to the  upstream cluster. If not specified,
                            the default is 1024.  This limit does not apply to non-HTTP
                            traffic.
                          format: int32
                          type: integer
                        max_retries:
                          description: The maximum number of parallel retries that
                            Envoy will allow to the  upstream cluster. If not specified,
                            the default is 3.
                          format: int32
                          type: integer
                        priority:
                          description: The :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`  the
                            specified CircuitBreaker settings apply to.
                          enum:
                          - DEFAULT
                          - HIGH
                          type: string
                        retry_budget:
                          description: 'Specifies a limit on concurrent retries in
                            relation to the number of active requests. This  parameter
                            is optional.   .. note::      If this field is set, the
                            retry budget will override any configured retry circuit     breaker.'
                          properties:
                            budget_percent:
                              description: Specifies the limit on concurrent retries
                                as a percentage of the sum of active requests and  active
                                pending requests. For example, if there are 100 active
                                requests and the  budget_percent is set to 25, there
                                may be 25 active retries.   This parameter is optional.
                                Defaults to 20%.
                              properties:
                                value:
                                  format: double
                                  type: number
                              type: object
                            min_retry_concurrency:
                              description: Specifies the minimum retry concurrency
                                allowed for the retry budget. The limit on the  number
                                of active retries may never go below this number.   This
                                parameter is optional. Defaults to 3.
                              format: int32
                              type: integer
                          type: object
                        track_remaining:
                          description: 'If track_remaining is true, then stats will
                            be published that expose  the number of resources remaining
                            until the circuit breakers open. If  not specified, the
                            default is false.   .. note::      If a retry budget is
                            used in lieu of the max_retries circuit breaker,     the
                            remaining retry resources remaining will not be tracked.'
                          type: boolean
                      type: object
                    type: array
                  thresholds:
                    description: If multiple :ref:`Thresholds<envoy_v3_api_msg_config.cluster.v3.CircuitBreakers.Thresholds>`  are
                      defined with the same :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`,  the
                      first one in the list is used. If no Thresholds is defined for
                      a given  :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`,
                      the default values  are used.
                    items:
                      description: 'A Thresholds defines CircuitBreaker settings for
                        a  :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`.  [#next-free-field:
                        9]'
                      properties:
                        max_connection_pools:
                          description: The maximum number of connection pools per
                            cluster that Envoy will concurrently support at  once.
                            If not specified, the default is unlimited. Set this for
                            clusters which create a  large number of connection pools.
                            See  :ref:`Circuit Breaking <arch_overview_circuit_break_cluster_maximum_connection_pools>`
                            for  more details.
                          format: int32
                          type: integer
                        max_connections:
                          description: The maximum number of connections that Envoy
                            will make to the upstream  cluster. If not specified,
                            the default is 1024.
                          format: int32
                          type: integer
                        max_pending_requests:
                          description: The maximum number of pending requests that
                            Envoy will allow to the  upstream cluster. If not specified,
                            the default is 1024.  This limit is applied as a connection
                            limit for non-HTTP traffic.
                          format: int32
                          type: integer
                        max_requests:
                          description: The maximum number of parallel requests that
                            Envoy will make to the  upstream cluster. If not specified,
                            the default is 1024.  This limit does not apply to non-HTTP
                            traffic.
                          format: int32
                          type: integer
                        max_retries:
                          description: The maximum number of parallel retries that
                            Envoy will allow to the  upstream cluster. If not specified,
                            the default is 3.
                          format: int32
                          type: integer
                        priority:
                          description: The :ref:`RoutingPriority<envoy_v3_api_enum_config.core.v3.RoutingPriority>`  the
                            specified CircuitBreaker settings apply to.
                          enum:
                          - DEFAULT
                          - HIGH
                          type: string
                        retry_budget:
                          description: 'Specifies a limit on concurrent retries in
                            relation to the number of active requests. This  parameter
                            is optional.   .. note::      If this field is set, the
                            retry budget will override any configured retry circuit     breaker.'
                          properties:
                            budget_percent:
                              description: Specifies the limit on concurrent retries
                                as a percentage of the sum of active requests and  active
                                pending requests. For example, if there are 100 active
                                requests and the  budget_percent is set to 25, there
                                may be 25 active retries.   This parameter is optional.
                                Defaults to 20%.
                              properties:
                                value:
                                  format: double
                                  type: number
                              type: object
                            min_retry_concurrency:
                              description: Specifies the minimum retry concurrency
                                allowed for the retry budget. The limit on the  number
                                of active retries may never go below this number.   This
                                parameter is optional. Defaults to 3.
                              format: int32
                              type: integer
                          type: object
                        track_remaining:
                          description: 'If track_remaining is true, then stats will
                            be published that expose  the number of resources remaining
                            until the circuit breakers open. If  not specified, the
                            default is false.   .. note::      If a retry budget is
                            used in lieu of the max_retries circuit breaker,     the
                            remaining retry resources remaining will not be tracked.'
                          type: boolean
                      type: object
                    type: array
                type: object
              cleanup_interval:
                description: The interval for removing stale hosts from a cluster
                  type  :ref:`ORIGINAL_DST<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.ORIGINAL_DST>`.  Hosts
                  are considered stale if they have not been used  as upstream destinations
                  during this interval. New hosts are added  to original destination
                  clusters on demand as new connections are  redirected to Envoy,
                  causing the number of hosts in the cluster to  grow over time. Hosts
                  that are not stale (they are actively used as  destinations) are
                  kept in the cluster, which allows connections to  them remain open,
                  saving the latency that would otherwise be spent  on opening new
                  connections. If this setting is not specified, the  value defaults
                  to 5000ms. For cluster types other than  :ref:`ORIGINAL_DST<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.ORIGINAL_DST>`  this
                  setting is ignored.
                type: string
              close_connections_on_host_health_failure:
                description: 'If an upstream host becomes unhealthy (as determined
                  by the configured health checks  or outlier detection), immediately
                  close all connections to the failed host.   .. note::     This is
                  currently only supported for connections created by tcp_proxy.   ..
                  note::     The current implementation of this feature closes all
                  connections immediately when    the unhealthy status is detected.
                  If there are a large number of connections open    to an upstream
                  host that becomes unhealthy, Envoy may spend a substantial amount
                  of    time exclusively closing these connections, and not processing
                  any other traffic.'
                type: boolean
              cluster_type:
                description: The custom cluster type.
                properties:
                  name:
                    description: The type of the cluster to instantiate. The name
                      must match a supported cluster type.
                    type: string
                  typed_config:
                    description: 'Cluster specific configuration which depends on
                      the cluster being instantiated.  See the supported cluster for
                      further documentation.  [#extension-category: envoy.clusters]'
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              common_http_protocol_options:
                description: Additional options when handling HTTP requests upstream.
                  These options will be applicable to  both HTTP1 and HTTP2 requests.  This
                  has been deprecated in favor of  :ref:`common_http_protocol_options
                  <envoy_v3_api_field_extensions.upstreams.http.v3.HttpProtocolOptions.common_http_protocol_options>`  in
                  the :ref:`http_protocol_options <envoy_v3_api_msg_extensions.upstreams.http.v3.HttpProtocolOptions>`
                  message.  common_http_protocol_options can be set via the cluster's  :ref:`extension_protocol_options<envoy_v3_api_field_config.cluster.v3.Cluster.typed_extension_protocol_options>`.  See
                  :ref:`upstream_http_protocol_options  <envoy_v3_api_field_extensions.upstreams.http.v3.HttpProtocolOptions.upstream_http_protocol_options>`  for
                  example usage.
                properties:
                  headers_with_underscores_action:
                    description: 'Action to take when a client request with a header
                      name containing underscore characters is received.  If this
                      setting is not specified, the value defaults to ``ALLOW``.   ..
                      note::     Upstream responses are not affected by this setting.   ..
                      note::     This only affects client headers. It does not affect
                      headers added by Envoy filters and does not have any    impact
                      if added to cluster config.'
                    enum:
                    - ALLOW
                    - REJECT_REQUEST
                    - DROP_HEADER
                    type: string
                  idle_timeout:
                    description: 'The idle timeout for connections. The idle timeout
                      is defined as the  period in which there are no active requests.
                      When the  idle timeout is reached the connection will be closed.
                      If the connection is an HTTP/2  downstream connection a drain
                      sequence will occur prior to closing the connection, see  :ref:`drain_timeout  <envoy_v3_api_field_extensions.filters.network.http_connection_manager.v3.HttpConnectionManager.drain_timeout>`.   ..
                      note::     Request based timeouts mean that HTTP/2 PINGs will
                      not keep the connection alive.   If not specified, this defaults
                      to ``1 hour``. To disable idle timeouts explicitly set this
                      to ``0``.   .. warning::    Disabling this timeout has a highly
                      likelihood of yielding connection leaks due to lost TCP    FIN
                      packets, etc.   If the :ref:`overload action <config_overload_manager_overload_actions>`
                      "envoy.overload_actions.reduce_timeouts"  is configured, this
                      timeout is scaled for downstream connections according to the
                      value for  :ref:`HTTP_DOWNSTREAM_CONNECTION_IDLE <envoy_v3_api_enum_value_config.overload.v3.ScaleTimersOverloadActionConfig.TimerType.HTTP_DOWNSTREAM_CONNECTION_IDLE>`.'
                    type: string
                  max_connection_duration:
                    description: The maximum duration of a connection. The duration
                      is defined as a period since a connection  was established.
                      If not set, there is no max duration. When max_connection_duration
                      is reached,  the drain sequence will kick-in. The connection
                      will be closed after the drain timeout period  if there are
                      no active streams. See :ref:`drain_timeout  <envoy_v3_api_field_extensions.filters.network.http_connection_manager.v3.HttpConnectionManager.drain_timeout>`.
                    type: string
                  max_headers_count:
                    description: The maximum number of headers (request headers if
                      configured on HttpConnectionManager,  response headers when
                      configured on a cluster).  If unconfigured, the default maximum
                      number of headers allowed is ``100``.  The default value for
                      requests can be overridden by setting runtime key ``envoy.reloadable_features.max_request_headers_count``.  The
                      default value for responses can be overridden by setting runtime
                      key ``envoy.reloadable_features.max_response_headers_count``.  Downstream
                      requests that exceed this limit will receive a ``HTTP 431``
                      response for HTTP/1.x and cause a stream  reset for HTTP/2.  Upstream
                      responses that exceed this limit will result in a ``HTTP 502``
                      response.
                    format: int32
                    type: integer
                  max_requests_per_connection:
                    description: Optional maximum requests for both upstream and downstream
                      connections.  If not specified, there is no limit.  Setting
                      this parameter to ``1`` will effectively disable keep alive.  For
                      HTTP/2 and HTTP/3, due to concurrent stream processing, the
                      limit is approximate.
                    format: int32
                    type: integer
                  max_response_headers_kb:
                    description: 'The maximum size of response headers.  If unconfigured,
                      the default is ``60 KiB``, except for HTTP/1 response headers
                      which have a default  of ``80 KiB``.  The default value can
                      be overridden by setting runtime key ``envoy.reloadable_features.max_response_headers_size_kb``.  Responses
                      that exceed this limit will result in a ``HTTP 503`` response.  In
                      Envoy, this setting is only valid when configured on an upstream
                      cluster, not on the  :ref:`HTTP Connection Manager  <envoy_v3_api_field_extensions.filters.network.http_connection_manager.v3.HttpConnectionManager.common_http_protocol_options>`.   ..
                      note::     Currently some protocol codecs impose limits on the
                      maximum size of a single header.     * HTTP/2 (when using ``nghttp2``)
                      limits a single header to around ``100kb``.    * HTTP/3 limits
                      a single header to around ``1024kb``.'
                    format: int32
                    type: integer
                  max_stream_duration:
                    description: Total duration to keep alive an HTTP request/response
                      stream. If the time limit is reached the stream will be  reset
                      independent of any other timeouts. If not specified, this value
                      is not set.
                    type: string
                type: object
              common_lb_config:
                description: Common configuration for all load balancer implementations.
                properties:
                  close_connections_on_host_set_change:
                    description: If set to ``true``, the cluster manager will drain
                      all existing  connections to upstream hosts whenever hosts are
                      added or removed from the cluster.
                    type: boolean
                  consistent_hashing_lb_config:
                    description: Common Configuration for all consistent hashing load
                      balancers (MaglevLb, RingHashLb, etc.)
                    properties:
                      hash_balance_factor:
                        description: Configures percentage of average cluster load
                          to bound per upstream host. For example, with a value of
                          150  no upstream host will get a load more than 1.5 times
                          the average load of all the hosts in the cluster.  If not
                          specified, the load is not bounded for any upstream host.
                          Typical value for this parameter is between 120 and 200.  Minimum
                          is 100.   Applies to both Ring Hash and Maglev load balancers.   This
                          is implemented based on the method described in the paper
                          https://arxiv.org/abs/1608.01350. For the specified  ``hash_balance_factor``,
                          requests to any upstream host are capped at ``hash_balance_factor/100``
                          times the average number of requests  across the cluster.
                          When a request arrives for an upstream host that is currently
                          serving at its max capacity, linear probing  is used to
                          identify an eligible host. Further, the linear probe is
                          implemented using a random jump in hosts ring/table to identify  the
                          eligible host (this technique is as described in the paper
                          https://arxiv.org/abs/1908.08762 - the random jump avoids
                          the  cascading overflow effect when choosing the next host
                          in the ring/table).   If weights are specified on the hosts,
                          they are respected.   This is an O(N) algorithm, unlike
                          other load balancers. Using a lower ``hash_balance_factor``
                          results in more hosts  being probed, so use a higher value
                          if you require better performance.
                        format: int32
                        type: integer
                      use_hostname_for_hashing:
                        description: If set to ``true``, the cluster will use hostname
                          instead of the resolved  address as the key to consistently
                          hash to an upstream host. Only valid for StrictDNS clusters
                          with hostnames which resolve to a single IP address.
                        type: boolean
                    type: object
                  healthy_panic_threshold:
                    description: 'Configures the :ref:`healthy panic threshold <arch_overview_load_balancing_panic_threshold>`.  If
                      not specified, the default is 50%.  To disable panic mode, set
                      to 0%.   .. note::    The specified percent will be truncated
                      to the nearest 1%.'
                    properties:
                      value:
                        format: double
                        type: number
                    type: object
                  ignore_new_hosts_until_first_hc:
                    description: If set to true, Envoy will :ref:`exclude <arch_overview_load_balancing_excluded>`
                      new hosts  when computing load balancing weights until they
                      have been health checked for the first time.  This will have
                      no effect unless active health checking is also configured.
                    type: boolean
                  locality_weighted_lb_config:
                    description: Configuration for :ref:`locality weighted load balancing  <arch_overview_load_balancing_locality_weighted_lb>`
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  override_host_status:
                    description: This controls what hosts are considered valid when
                      using  :ref:`host overrides <arch_overview_load_balancing_override_host>`,
                      which is used by some  filters to modify the load balancing
                      decision.   If this is unset then [UNKNOWN, HEALTHY, DEGRADED]
                      will be applied by default. If this is  set with an empty set
                      of statuses then host overrides will be ignored by the load
                      balancing.
                    properties:
                      statuses:
                        description: An order-independent set of health status.
                        items:
                          enum:
                          - UNKNOWN
                          - HEALTHY
                          - UNHEALTHY
                          - DRAINING
                          - TIMEOUT
                          - DEGRADED
                          type: string
                        type: array
                    type: object
                  update_merge_window:
                    description: 'If set, all health check/weight/metadata updates
                      that happen within this duration will be  merged and delivered
                      in one shot when the duration expires. The start of the duration
                      is when  the first update happens. This is useful for big clusters,
                      with potentially noisy deploys  that might trigger excessive
                      CPU usage due to a constant stream of healthcheck state changes  or
                      metadata updates. The first set of updates to be seen apply
                      immediately (e.g.: a new  cluster). Please always keep in mind
                      that the use of sandbox technologies may change this  behavior.   If
                      this is not set, we default to a merge window of 1000ms. To
                      disable it, set the merge  window to 0.   .. note::    Merging
                      does not apply to cluster membership changes (e.g.: adds/removes);
                      this is    because merging those updates isn''t currently safe.
                      See    https://github.com/envoyproxy/envoy/pull/3941.'
                    type: string
                  zone_aware_lb_config:
                    description: Configuration for :ref:`zone aware routing  <arch_overview_load_balancing_zone_aware_routing>`.
                    properties:
                      fail_traffic_on_panic:
                        description: If set to true, Envoy will not consider any hosts
                          when the cluster is in :ref:`panic  mode<arch_overview_load_balancing_panic_threshold>`.
                          Instead, the cluster will fail all  requests as if all hosts
                          are unhealthy. This can help avoid potentially overwhelming
                          a  failing service.
                        type: boolean
                      min_cluster_size:
                        description: Configures minimum upstream cluster size required
                          for zone aware routing  If upstream cluster size is less
                          than specified, zone aware routing is not performed  even
                          if zone aware routing is configured. If not specified, the
                          default is 6.  * :ref:`runtime values <config_cluster_manager_cluster_runtime_zone_routing>`.  *
                          :ref:`Zone aware routing support <arch_overview_load_balancing_zone_aware_routing>`.
                        format: int64
                        type: integer
                      routing_enabled:
                        description: Configures percentage of requests that will be
                          considered for zone aware routing  if zone aware routing
                          is configured. If not specified, the default is 100%.  *
                          :ref:`runtime values <config_cluster_manager_cluster_runtime_zone_routing>`.  *
                          :ref:`Zone aware routing support <arch_overview_load_balancing_zone_aware_routing>`.
                        properties:
                          value:
                            format: double
                            type: number
                        type: object
                    type: object
                type: object
              connect_timeout:
                description: The timeout for new network connections to hosts in the
                  cluster.  If not set, a default value of 5s will be used.
                type: string
              connection_pool_per_downstream_connection:
                description: If ``connection_pool_per_downstream_connection`` is true,
                  the cluster will use a separate  connection pool for every downstream
                  connection
                type: boolean
              dns_failure_refresh_rate:
                description: If the DNS failure refresh rate is specified and the
                  cluster type is either  :ref:`STRICT_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.STRICT_DNS>`,  or
                  :ref:`LOGICAL_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.LOGICAL_DNS>`,  this
                  is used as the cluster’s DNS refresh rate when requests are failing.
                  If this setting is  not specified, the failure refresh rate defaults
                  to the DNS refresh rate. For cluster types  other than :ref:`STRICT_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.STRICT_DNS>`
                  and  :ref:`LOGICAL_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.LOGICAL_DNS>`
                  this setting is  ignored.  This field is deprecated in favor of
                  using the :ref:`cluster_type<envoy_v3_api_field_config.cluster.v3.Cluster.cluster_type>`  extension
                  point and configuring it with :ref:`DnsCluster<envoy_v3_api_msg_extensions.clusters.dns.v3.DnsCluster>`.  If
                  :ref:`cluster_type<envoy_v3_api_field_config.cluster.v3.Cluster.cluster_type>`
                  is configured with  :ref:`DnsCluster<envoy_v3_api_msg_extensions.clusters.dns.v3.DnsCluster>`,
                  this field will be ignored.
                properties:
                  base_interval:
                    description: Specifies the base interval between refreshes. This
                      parameter is required and must be greater  than zero and less
                      than  :ref:`max_interval <envoy_v3_api_field_config.cluster.v3.Cluster.RefreshRate.max_interval>`.
                    type: string
                  max_interval:
                    description: Specifies the maximum interval between refreshes.
                      This parameter is optional, but must be  greater than or equal
                      to the  :ref:`base_interval <envoy_v3_api_field_config.cluster.v3.Cluster.RefreshRate.base_interval>`  if
                      set. The default  is 10 times the :ref:`base_interval <envoy_v3_api_field_config.cluster.v3.Cluster.RefreshRate.base_interval>`.
                    type: string
                type: object
              dns_jitter:
                description: DNS jitter can be optionally specified if the cluster
                  type is either  :ref:`STRICT_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.STRICT_DNS>`,  or
                  :ref:`LOGICAL_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.LOGICAL_DNS>`.  DNS
                  jitter causes the cluster to refresh DNS entries later by a random
                  amount of time to avoid a  stampede of DNS requests. This value
                  sets the upper bound (exclusive) for the random amount.  There will
                  be no jitter if this value is omitted. For cluster types other than  :ref:`STRICT_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.STRICT_DNS>`  and
                  :ref:`LOGICAL_DNS<envoy_v3_api_enum_value_config.cluster.v3.Cluster.DiscoveryType.LOGICAL_DNS>`  this
                  setting is ignored.  This field is deprecated in favor of using
                  the :ref:`cluster_type<envoy_v3_api_field_config.cluster.v3.Cluster.cluster_type>`  extension
                  point and configuring it with :ref:`DnsCluster<envoy_v3_api_msg_extensions.clusters.dns.v3.DnsCluster>`.  If
                  :ref:`cluster_type<envoy_v3_api_field_config.cluster.v3.Cluster.cluster_type>`
                  is configured with  :ref:`DnsCluster<envoy_v3_api_msg_extensions.clusters.dns.v3.DnsCluster>`,
                  this field will be ignored.
                type: string
              dns_lookup_family:
                description: The DNS IP address resolution policy. If this setting
